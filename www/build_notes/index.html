<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <title>Build Notes | C-Server</title>
  <link rel="stylesheet" href="/style.css">
  <!-- this will inject your <header> and <footer> -->
  <script src="/assets/header.js" defer></script>
</head>
<body>
  <main>
    <!-- DIAGRAMS SECTION -->
    <section>
      <h2>Diagrams</h2>
      <select id="diagramSelect"></select>
      <iframe
        id="diagram"
        frameborder="0"
        style="width:100%; height:400px;"
        title="PlantUML diagram">
      </iframe>
    </section>

    <!-- NOTES SECTION -->
    <section>
      <h2>Notes</h2>
      <div id="notesContainer"></div>
    </section>
  </main>

  <!-- PlantUML encoder -->
  <script src="https://cdn.jsdelivr.net/npm/plantuml-encoder/dist/plantuml-encoder.js"></script>
  <!-- your script that fetches manifest.json, diagrams & notes -->
  <script src="/build_notes/load-notes.js" defer></script>
</body>
</html>
