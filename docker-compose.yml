version: "3.9"

services:
  reverse:
    image: nginx:1.27-alpine
    volumes:
      - ./docker/nginx/default.conf:/etc/nginx/conf.d/default.conf:ro
      - homedata:/srv/HomeServer/www:ro
    ports:
      - "80:80"          # public HTTP only
    restart: unless-stopped
    depends_on:
      - app

  app:
    build:
      context: .
      target: final       # uses the last stage in your Dockerfile
    environment:
      - SERVER_PORT=3490
    volumes:
      - homedata:/var/lib/HomeServer  # keeps expenses DB between upgrades
    expose:
      - "3490"           # internal only
    restart: unless-stopped

volumes:
  homedata:
