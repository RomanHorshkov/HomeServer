<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <title>Expenses Overview</title>
  <link rel="stylesheet" href="/assets/style.css">
  <script src="/assets/header.js" defer></script>
  <script src="https://cdn.jsdelivr.net/npm/chart.js" defer></script>
</head>
<body>
  <main>
    <h1>Expenses Overview</h1>
    <!-- =========================
        1) Date filters + charts
      ========================= -->
    <fieldset id="date-filter" style="margin-bottom:1rem; border:0; padding:0;">
      <legend style="font-size:1rem; font-weight:600;">Filter by date</legend>
      <label for="from-date">From:
        <input id="from-date" name="from-date" type="date" autocomplete="off">
      </label>
      <label for="to-date" style="margin-left:1rem;">To:
        <input id="to-date" name="to-date" type="date" autocomplete="off">
      </label>
      <button id="reset-filters" type="button" style="margin-left:1rem;">Reset Filters</button>
    </fieldset>

    <div class="charts-row">
      <div class="chart-wrapper">
        <canvas id="monthly-chart" height="400" aria-label="Monthly expenses chart" role="img"></canvas>
      </div>
      <div class="chart-wrapper">
        <canvas id="category-chart" height="400" aria-label="Expenses by category chart" role="img"></canvas>
      </div>
    </div>

    <div id="loading-indicator" style="text-align:center; margin:2rem 0; display:none;">
      <span>Loading expenses data…</span>
    </div>

    <!-- =========================
        Add Expense Form
      ========================= -->
    <form id="add-expense-form" style="margin-bottom:2rem; display:flex; flex-wrap:wrap; gap:1rem; align-items:flex-end;">
      <div>
        <label for="expense-date">Date<br>
          <input type="date" id="expense-date" name="date" required>
        </label>
      </div>
      <div>
        <label for="expense-category">Category<br>
          <select id="expense-category" name="category" required>
            <option value="rent">Rent</option>
            <option value="transport">Transport</option>
            <option value="food">Food</option>
            <option value="groceries">Groceries</option>
            <option value="other">Other</option>
          </select>
        </label>
      </div>
      <div>
        <label for="expense-amount">Amount (€)<br>
          <input type="number" id="expense-amount" name="amount" min="0.01" step="0.01" required>
        </label>
      </div>
      <div>
        <label for="expense-comment">Comment<br>
          <input type="text" id="expense-comment" name="comment" maxlength="100">
        </label>
      </div>
      <button type="submit">Add Expense</button>
      <span id="expense-form-error" style="color:red; margin-left:1rem;"></span>
    </form>

    <table id="expenses-table" aria-label="Expenses table">
      <thead>
        <tr>
          <th scope="col">Date</th><th scope="col">Category</th><th scope="col">Amount</th><th scope="col">Comment</th>
        </tr>
      </thead>
      <tbody></tbody>
    </table>
  </main>
  <script>

    document.addEventListener('DOMContentLoaded', async () => {
      const loading = document.getElementById('loading-indicator');
      loading.style.display = '';
      try {
        // ───────────────────────────────────────────────────────
        // 1) LOAD: fetch the list of months, then each month’s JSON
        // ───────────────────────────────────────────────────────
        const months = await fetch('/api/expenses')
          .then(r => { if (!r.ok) throw new Error('months list fetch failed'); return r.json(); });

        /* Fetch each month’s expenses in parallel, then flatten */
        const perMonth = await Promise.all(
          months.map(ms => {
            // ms is "YYYY-MM"
            const [year, month] = ms.split('-');
            return fetch(`/expenses/${year}/${month}.json`)
              .then(r => { if (!r.ok) throw new Error(`failed ${ms}`); return r.json(); });
          })
        );
        const all = perMonth.flat();

        // ───────────────────────────────────────────────────────
        // 2) PREPROCESS: convert string dates → JS Date objects
        //    so we can filter by < and > easily
        // ───────────────────────────────────────────────────────
        all.forEach(e => {
          const [d, m, y] = e.date.split('/').map(Number);
          // JS Date: months are 0–11
          e.dateObj = new Date(y, m - 1, d);
        });

        // Grab handles to our two date inputs
        const fromInput = document.getElementById('from-date');
        const toInput   = document.getElementById('to-date');
        const resetBtn  = document.getElementById('reset-filters');

        // ───────────────────────────────────────────────────────
        // 3) RENDER FUNCTION: builds charts + table from any
        //    passed-in list of expense objects
        // ───────────────────────────────────────────────────────
        function renderExpenses(expenses) {
          // --- A) MONTHLY STACKED-BAR DATASET ---
          // 1. Recompute unique month labels from filtered data
          const monthMap = {};
          expenses.forEach(e => {
            const key = e.dateObj.getFullYear() + '-' +
                        String(e.dateObj.getMonth()+1).padStart(2,'0');
            (monthMap[key] ||= []).push(e);
          });
          const filteredMonths = Object.keys(monthMap).sort();

          // 2. Collect categories across all filtered months
          const categories = new Set();
          filteredMonths.forEach(mo => {
            monthMap[mo].forEach(e => categories.add(e.category));
          });
          const catList = Array.from(categories);

          // 3. Build Chart.js datasets: one per category
          const barDatasets = catList.map((cat, idx) => {
            // For each month, sum amounts for this category
            const data = filteredMonths.map(mo =>
              monthMap[mo]
                .filter(e => e.category === cat)
                .reduce((sum, e) => sum + e.amount, 0)
            );
            // HSL color so each cat has a distinct hue
            const hue = (idx * 70) % 360;
            return {
              label: cat,
              data,
              backgroundColor: `hsl(${hue},70%,60%)`,
              borderColor:   '#111',
              borderWidth:   1,
              hoverBorderColor: '#fff'
            };
          });

          // Update bar chart
          barChart.data.labels   = filteredMonths;
          barChart.data.datasets = barDatasets;
          barChart.update();

          // --- B) PIE CHART: total per category over all filtered expenses ---
          const totalsByCat = {};
          expenses.forEach(e => {
            totalsByCat[e.category] = (totalsByCat[e.category] || 0) + e.amount;
          });
          const pieLabels = Object.keys(totalsByCat);
          const pieData   = pieLabels.map(l => totalsByCat[l]);
          const pieColors = pieLabels.map((_, i) => {
            const hue = (i * 60) % 360;
            return `hsl(${hue},70%,60%)`;
          });

          pieChart.data.labels = pieLabels;
          pieChart.data.datasets[0].data            = pieData;
          pieChart.data.datasets[0].backgroundColor = pieColors;
          pieChart.update();

          // --- C) TABLE: rebuild tbody from filtered expenses ---
          const tbody = document.querySelector('#expenses-table tbody');
          tbody.innerHTML = '';  // clear old rows
          expenses.forEach(e => {
            const tr = document.createElement('tr');
            // format back to dd/mm/yyyy string
            tr.innerHTML = `
              <td>${e.date}</td>
              <td>${e.category}</td>
              <td>€${e.amount.toFixed(2)}</td>
              <td>${e.comment || ''}</td>
            `;
            tbody.appendChild(tr);
          });
        }

        // ───────────────────────────────────────────────────────
        // 4) INSTANTIATE CHARTS (once), then you’ll just call .update()
        // ───────────────────────────────────────────────────────
        const ctxStacked = document.getElementById('monthly-chart').getContext('2d');
        window.barChart = new Chart(ctxStacked, {
          type: 'bar',
          data: { labels: [], datasets: [] },
          options: {
            responsive: true,
            scales: { x:{ stacked:true }, y:{ stacked:true, beginAtZero:true } },
            plugins: {
              title: { display:true, text:'Expenses Totals Composition' },
              legend: { position:'top' }
            }
          }
        });

        const ctxPie = document.getElementById('category-chart').getContext('2d');
        window.pieChart = new Chart(ctxPie, {
          type: 'pie',
          data: {
            labels: [],
            datasets: [{ data: [], backgroundColor: [], hoverOffset:8 }]
          },
          options: {
            responsive: true,
            plugins: {
              title: { display:true, text:'Expenses by Category' },
              legend: { position:'right' }
            }
          }
        });

        // ───────────────────────────────────────────────────────
        // 5) FILTER HANDLERS: whenever a date changes, re-filter+render
        // ───────────────────────────────────────────────────────
        function onFilterChange() {
          /* parse the "YYYY-MM-DD" strings ourselves, so we get local‐midnight dates */
          let from = null, to = null;

          if (fromInput.value) {
            /* e.g. "2025-01-01" → [2025,1,1] */
            const [y, m, d] = fromInput.value.split('-').map(Number);
            /* local midnight start of that day */
            from = new Date(y, m - 1, d, 0, 0, 0, 0);
          }

          if (toInput.value) {
            const [y, m, d] = toInput.value.split('-').map(Number);
            /* local **end** of that day, to make the filter inclusive */
            to = new Date(y, m - 1, d, 23, 59, 59, 999);
          }

          /* filter purely by numeric timestamps */
          const filtered = all.filter(e => {
            const t = e.dateObj.getTime();  // we built dateObj as new Date(y,m-1,d)
            if (from && t < from.getTime()) return false;
            if (to   && t > to.getTime())   return false;
            return true;
          });

          /* re-draw charts / table */
          renderExpenses(filtered);
        }

        fromInput.addEventListener('change', onFilterChange);
        toInput.addEventListener  ('change', onFilterChange);
        resetBtn.addEventListener('click', () => {
          fromInput.value = '';
          toInput.value = '';
          renderExpenses(all);
        });

        // ───────────────────────────────────────────────────────
        // 6) INITIAL RENDER with the full dataset
        // ───────────────────────────────────────────────────────
        renderExpenses(all);
        loading.style.display = 'none';

      } catch (err) {
        loading.style.display = 'none';
        console.error('Error loading expenses data:', err);
        document.body.insertAdjacentHTML(
          'afterbegin',
          `<p style="color:red">Couldn’t load expenses: ${err.message}</p>`
        );
      }
    });

    // Set default date to today for the add expense form
    const expenseDateInput = document.getElementById('expense-date');
    if (expenseDateInput) {
      const today = new Date();
      expenseDateInput.value = today.toISOString().slice(0,10);
    }

    // Handle add expense form submission
    const addExpenseForm = document.getElementById('add-expense-form');
    const formError = document.getElementById('expense-form-error');
    if (addExpenseForm) {
      addExpenseForm.addEventListener('submit', function(e) {
        e.preventDefault();
        formError.textContent = '';

        // actual form input data
        const date = expenseDateInput.value;
        const category = document.getElementById('expense-category').value;
        const amount = parseFloat(document.getElementById('expense-amount').value);
        const comment = document.getElementById('expense-comment').value;
        if (!amount || amount <= 0) {
          formError.textContent = 'Amount is required and must be positive.';
          return;
        }
        // Format date as dd/mm/yyyy
        const [y, m, d] = date.split('-');
        const formattedDate = `${d}/${m}/${y}`;
        const newExpense = {
          date: formattedDate,
          category,
          amount,
          comment
        };
        // Send newExpense to backend API to save
        fetch('/api/expenses', {
          method: 'PUT',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify(newExpense)
        })
        .then(response => {
          if (!response.ok) throw new Error('Failed to save expense');
          formError.style.color = 'green';
          formError.textContent = 'Expense saved!';
          setTimeout(() => { formError.textContent = ''; formError.style.color = 'red'; }, 2000);
          addExpenseForm.reset();
          expenseDateInput.value = new Date().toISOString().slice(0,10);
          // Optionally, reload data to show new expense
          location.reload();
        })
        .catch(err => {
          formError.style.color = 'red';
          formError.textContent = 'Error saving expense: ' + err.message;
        });
      });
    }
  </script>
</body>
</html>
