<!-- drive.html – now uses external style.css for global theme -->
<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width,initial-scale=1">
  <title>Drive</title>

  <!-- Global stylesheet & icons -------------------------------------- -->
  <link href="/assets/style.css" rel="stylesheet">
  <script src="/assets/header.js" defer></script>
</head>
<body>
  <h1>Drive</h1>

  <!-- Toolbar: Up one level + breadcrumb trail ----------------------- -->
  <div class="toolbar">
    <button id="upBtn" title="Up one level">
      <i class="fa-solid fa-arrow-up"></i> Up
    </button>
    <span id="breadcrumbs" class="breadcrumbs">/</span>
  </div>

  <!-- Lazily‑loaded directory tree ------------------------------------ -->
  <div id="tree"></div>

  <script>
    /* Same JS as before – untouch */
    const tree   = document.getElementById('tree');
    const crumbs = document.getElementById('breadcrumbs');
    const upBtn  = document.getElementById('upBtn');
    let currentPath = '/';

    const enc = p => p.split('/') .map(encodeURIComponent).join('/');
    const parent = p => (p === '/') ? '/' : '/' + p.replace(/^\/+/,'').replace(/\/+$/, '').split('/').slice(0,-1).join('/');

    function load(path, container) {
      fetch('/api/drive?path=' + enc(path))
        .then(r => r.json())
        .then(data => {
          container.innerHTML = '';
          data.items.sort((a,b)=> a.type.localeCompare(b.type)||a.name.localeCompare(b.name));
          data.items.forEach(item=>{
            const full = path + (path.endsWith('/')?'':'/') + item.name;
            if(item.type==='directory'){
              const det=document.createElement('details');
              det.innerHTML=`<summary><span class="arrow">&#9656;</span><span class="entry-icon"><i class="fa-solid fa-folder"></i></span><span class="directory">${item.name}</span></summary>`;
              det.addEventListener('toggle',()=>{
                if(det.open&&!det.dataset.loaded){
                  const ul=document.createElement('ul');
                  det.appendChild(ul);
                  load(full,ul);
                  det.dataset.loaded=1;
                }
              });
              container.appendChild(det);
            }else{
              const li=document.createElement('li');
              li.innerHTML=`<span class="entry-icon"><i class="fa-solid fa-file-lines"></i></span><a href="${full}" class="file" target="_blank" rel="noopener">${item.name}</a>`;
              container.appendChild(li);
            }
          });
        })
        .catch(err=>{console.error(err);container.innerHTML='<p style="color:#f55">Failed to load directory.</p>';});
    }

    function refresh(){
      crumbs.textContent=currentPath;
      upBtn.disabled=currentPath==='/' ;
      tree.innerHTML='';
      load(currentPath,tree);
    }

    upBtn.addEventListener('click',()=>{currentPath=parent(currentPath);refresh();});
    refresh();
  </script>
</body>
</html>
