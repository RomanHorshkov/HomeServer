<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <title>Who Am I?</title>
  <link rel="stylesheet" href="/assets/style.css">
  <script src="/assets/header.js" defer></script>
  <style>
    #clock { font-size: 1.5rem; margin-bottom: 1em; }
  </style>
</head>
<body>
  <h1>Who Am I?</h1>
  <div id="info">
    <p>Loading…</p>
  </div>

  <script>
    async function loadWhoami() {
      // 1) fetch the JSON from your C server
      const resp = await fetch('/api/whoami');
      const data = await resp.json();

      // 2) seed the clock and set up ticker
      let serverTime = new Date(data.server_time);
      const clockEl = document.createElement('div');
      clockEl.id = 'clock';
      document.getElementById('info').innerHTML = ''; // clear “Loading…”
      document.getElementById('info').append(clockEl);

      // show milliseconds
      const fmt = new Intl.DateTimeFormat(undefined, {
        hour:   'numeric',
        minute: 'numeric',
        second: 'numeric',
        fractionalSecondDigits: 3
      });

      function updateClock() {
        serverTime = new Date(serverTime.getTime() + 100);
        clockEl.textContent = fmt.format(serverTime);
      }
      updateClock();
      setInterval(updateClock, 100);

      // 3) dump method, path, headers
      const meta = document.createElement('div');
      meta.innerHTML = `
        <p><strong>Method:</strong> ${data.method}</p>
        <p><strong>Path:</strong> ${data.path}</p>
        <h3>Headers</h3>
        <ul>
          ${Object.entries(data.headers)
            .map(([k,v]) => `<li>${k}: ${v}</li>`).join('')}
        </ul>`;
      document.getElementById('info').append(meta);
    }

    // kick it off
    loadWhoami();
  </script>
</body>
</html>
