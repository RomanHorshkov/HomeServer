user www-data;
worker_processes auto;
pid /run/nginx.pid;

events {
    worker_connections 10240;
    multi_accept on;
    use epoll;
}

http {
    ##
    # Basic settings
    ##
    sendfile on;
    tcp_nopush on;
    tcp_nodelay on;
    keepalive_timeout 60;
    types_hash_max_size 2048;

    include /etc/nginx/mime.types;
    default_type application/octet-stream;

    ##
    # Logging
    ##
    log_format main '$remote_addr - $remote_user [$time_local] "$request" '
                    '$status $body_bytes_sent "$http_referer" '
                    '"$http_user_agent" "$http_x_forwarded_for"';

    access_log /var/log/nginx/access.log main;
    error_log /var/log/nginx/error.log warn;

    ##
    # Gzip compression
    ##
    gzip on;
    gzip_disable "msie6";
    gzip_types text/plain text/css application/json application/javascript text/xml application/xml application/xml+rss text/javascript;

    ##
    # Rate limiting zone
    ##
    limit_req_zone $binary_remote_addr zone=api_zone:10m rate=10r/s;

    ##
    # SSL (HTTPS)
    ##
    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_prefer_server_ciphers on;
    ssl_session_cache shared:SSL:10m;
    ssl_session_timeout 10m;

    ##
    # Cache control for static assets
    ##
    map $sent_http_content_type $expires {
        default off;
        text/html epoch;
        text/css max;
        application/javascript max;
        ~image/ max;
    }

    ##
    # Upstream backend
    ##
    upstream backend_c_server {
        server 127.0.0.1:3490;
        keepalive 64;
    }

    ##
    # Redirect all HTTP to HTTPS (80 → 443)
    ##
    server {
        listen 80 default_server;
        server_name patatellasharedhomecloud.cloud www.patatellasharedhomecloud.cloud;
        return 301 https://$host$request_uri;
    }

    ##
    # Main HTTPS Server
    ##
    server {
        listen 443 ssl http2;
        server_name patatellasharedhomecloud.cloud www.patatellasharedhomecloud.cloud;

        ##
        # TLS certificates (managed by Certbot)
        ##
        ssl_certificate     /etc/letsencrypt/live/patatellasharedhomecloud.cloud/fullchain.pem;
        ssl_certificate_key /etc/letsencrypt/live/patatellasharedhomecloud.cloud/privkey.pem;
        include              /etc/letsencrypt/options-ssl-nginx.conf;
        ssl_dhparam          /etc/letsencrypt/ssl-dhparams.pem;

        ##
        # Security headers
        ##
        add_header X-Frame-Options "SAMEORIGIN";
        add_header X-Content-Type-Options "nosniff";
        add_header X-XSS-Protection "1; mode=block";
        add_header Referrer-Policy "strict-origin-when-cross-origin";
        add_header Content-Security-Policy "default-src 'self'; script-src 'self'; object-src 'none';";

        ##
        # Serve static frontend (React)
        ##
        root /srv/home_server/pub/;
        index index.html;

        location / {
    		try_files $uri /index.html;
	}

        ##
        # API Reverse Proxy
        ##
        location /api/ {
            limit_req zone=api_zone burst=20 nodelay;
            proxy_pass http://backend_c_server;
            proxy_http_version 1.1;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
        }

        ##
        # Cache static resources
        ##
        location ~* \.(jpg|jpeg|png|gif|ico|css|js|woff|woff2|ttf|svg)$ {
            expires 30d;
            access_log off;
            add_header Cache-Control "public";
        }

        ##
        # Custom error pages
        ##
        # error_page 404 /404.html;
        # location = /404.html {
        #     root /var/www/html;
        #     internal;
        # }

        # error_page 500 502 503 504 /50x.html;
        # location = /50x.html {
        #     root /var/www/html;
        #     internal;
        # }
    }

    server {
    if ($host = www.patatellasharedhomecloud.cloud) {
        return 301 https://$host$request_uri;
    } # managed by Certbot


    if ($host = patatellasharedhomecloud.cloud) {
        return 301 https://$host$request_uri;
    } # managed by Certbot


    }
}
