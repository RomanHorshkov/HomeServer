name: CI

# DB_server had no working CI at all. The only workflow file that existed
# (http_manager_it_tests.yml, removed by this same commit) built and ran a
# CMake project under tests/IT/ that referenced
# app/src/core/worker/operator/client/http_man/http_manager.c and
# sanitizer.c — files that don't exist in this tree. That logic was
# extracted into the separate DB_http repo at some point (which now owns
# app/src/sanitizer.c and has its own real tests — see DB_http's own ci.yml)
# and tests/IT/ was never updated or removed to match. It also only ran on
# workflow_dispatch against master, so its breakage was invisible on every
# normal push/PR anyway.
#
# tests/IT/'s dead CMake project is left in place (not deleted) — retiring
# the broken CI wiring is this commit's job; whether to migrate it to test
# DB_http instead or delete it outright is a call for whoever owns that
# decision, not something to make silently here.
#
# REQUIRES the SIBLING_REPOS_PAT repo secret (Settings -> Secrets and
# variables -> Actions on THIS repo specifically — GitHub Actions secrets are
# per-repo, never shared across repos even under the same owner). DB_server
# itself is public, but every sibling it links except SPSCring/fs_util/Utils
# is private, so the checkout of the first private one 404s without it.
#
# Shaped as three independent, fully parallel jobs — same house pattern as
# EMlog/uuid7/SPSCring/MPSCring's quality.yml, adapted to DB_server's actual
# dependency depth. Each job re-checks-out and re-builds the full nine-repo
# sibling chain via the local `setup-siblings` composite action (a composite
# action, not a reusable workflow, because its whole job is to leave built
# libraries on THIS job's filesystem for the steps that follow — jobs never
# share a filesystem without an explicit artifact upload/download, so this
# is real duplicated build time, not shared state). None of the three needs:
# the others — they only share a recreated starting point, not each other's
# output — so they run concurrently instead of gating one another:
#
#   quality-db-app   — DB_app's own full build+test pipeline (validates the
#                       heaviest, most-changed dependency in isolation)
#   build-db-server  — DB_app build-only (fast, no tests — DB_server only
#                       needs the .a/.so to link) + DB_server build
#                       (release+audit) + package
#   test-db-server   — DB_app build-only + DB_server's own test suite

on:
  push:
  pull_request:
  workflow_dispatch:

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  quality-db-app:
    name: DB_app — build + full test pipeline
    runs-on: ubuntu-latest
    timeout-minutes: 30
    env:
      SIBLING_REPOS_TOKEN: ${{ secrets.SIBLING_REPOS_PAT || secrets.GITHUB_TOKEN }}
    steps:
      - name: Checkout DB_server
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2
        with:
          path: DB_server
          persist-credentials: false

      - name: Setup siblings (checkout + build + install)
        uses: ./DB_server/.github/actions/setup-siblings

      - name: DB_app — build libraries, build+run tests (all profiles)
        run: |
          cd DB_app
          ./utils/run_pipeline.sh build
          ./utils/run_pipeline.sh build_tests
          ./utils/run_pipeline.sh run_tests

      - name: Upload DB_app test results
        if: always()
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4.6.2
        with:
          name: db_app-test-results
          if-no-files-found: warn
          path: |
            DB_app/build/tests/results.tsv
            DB_app/build/tests/**/*.log

  build-db-server:
    name: Build DB_server (release + audit) + package
    runs-on: ubuntu-latest
    timeout-minutes: 20
    env:
      SIBLING_REPOS_TOKEN: ${{ secrets.SIBLING_REPOS_PAT || secrets.GITHUB_TOKEN }}
    steps:
      - name: Checkout DB_server
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2
        with:
          path: DB_server
          persist-credentials: false

      - name: Setup siblings (checkout + build + install)
        uses: ./DB_server/.github/actions/setup-siblings

      # Only the library is needed here (to link DB_server), not DB_app's
      # own test verdict — that's quality-db-app's job, running in parallel.
      - name: DB_app — build libraries only
        run: |
          cd DB_app
          ./utils/run_pipeline.sh build

      - name: DB_server — build (release + audit) + package
        run: |
          cd DB_server
          ./utils/run_pipeline.sh

      - name: Upload DB_server pipeline logs + package
        if: always()
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4.6.2
        with:
          name: db_server-pipeline
          if-no-files-found: warn
          path: |
            DB_server/build/pipeline/**
            DB_server/build/debs/*.deb

  test-db-server:
    name: DB_server — test suite (release)
    runs-on: ubuntu-latest
    timeout-minutes: 20
    env:
      SIBLING_REPOS_TOKEN: ${{ secrets.SIBLING_REPOS_PAT || secrets.GITHUB_TOKEN }}
    steps:
      - name: Checkout DB_server
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2
        with:
          path: DB_server
          persist-credentials: false

      - name: Setup siblings (checkout + build + install)
        uses: ./DB_server/.github/actions/setup-siblings

      - name: DB_app — build libraries only
        run: |
          cd DB_app
          ./utils/run_pipeline.sh build

      # run_pipeline.sh (the other two jobs) does NOT build or run
      # tests/*_tests.c — that's a separate step, matching
      # tests/bench/DANGEROUS_FOR_THE_HOST_TESTS.sh's build_everything, which
      # drives this same repo the same way.
      - name: DB_server — build test suite (release)
        run: |
          cd DB_server
          ./utils/build_tests.sh release

      - name: DB_server — run test suite
        run: |
          cd DB_server
          status=0
          for bin in build/tests/release/*_tests; do
            [[ -x "${bin}" ]] || continue
            echo "::group::$(basename "${bin}")"
            "${bin}" || status=1
            echo "::endgroup::"
          done
          exit "${status}"

      - name: Upload DB_server test logs
        if: always()
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4.6.2
        with:
          name: db_server-test-logs
          if-no-files-found: warn
          path: DB_server/build/tests/release/**
