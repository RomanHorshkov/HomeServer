name: HTTP Manager IT Tests

on:
  workflow_dispatch:

jobs:
  http-manager-it:
    if: github.ref == 'refs/heads/master'
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y libcmocka0 libcmocka-dev pkg-config

      - name: Build and run HTTP manager ITs
        run: ./utils/tests/IT/build_http_man_tests/run.sh
